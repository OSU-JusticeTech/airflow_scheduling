services:
  postgres:
    image: postgres:15
    container_name: justicetech-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-airflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-airflow}
      POSTGRES_DB: ${DB_NAME:-justicetech_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-airflow} -d ${DB_NAME:-justicetech_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    build: .
    container_name: justicetech-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER:-airflow}:${DB_PASSWORD:-airflow}@postgres:5432/${DB_NAME:-justicetech_db}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__SCHEDULER__CHILD_PROCESS_LOG_DIRECTORY: /opt/airflow/logs/scheduler
      AIRFLOW_HOME: /opt/airflow
      PYTHONPATH: /opt/airflow
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-airflow}
      DB_PASSWORD: ${DB_PASSWORD:-airflow}
      DB_NAME: ${DB_NAME:-justicetech_db}
      CASES_FILE_DIRECTORY: /opt/cases
      CVG_CASE_DIRS_ROOT: /opt/cases
    volumes:
      - ./:/opt/airflow
      - ../cases:/opt/cases:ro
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USERNAME:-admin}
      --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname ${AIRFLOW_ADMIN_FIRSTNAME:-Admin}
      --lastname ${AIRFLOW_ADMIN_LASTNAME:-User}
      --role Admin
      --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
      || true
      "

  airflow-webserver:
    build: .
    container_name: justicetech-airflow-webserver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER:-airflow}:${DB_PASSWORD:-airflow}@postgres:5432/${DB_NAME:-justicetech_db}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__SCHEDULER__CHILD_PROCESS_LOG_DIRECTORY: /opt/airflow/logs/scheduler
      AIRFLOW_HOME: /opt/airflow
      PYTHONPATH: /opt/airflow
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-airflow}
      DB_PASSWORD: ${DB_PASSWORD:-airflow}
      DB_NAME: ${DB_NAME:-justicetech_db}
      CASES_FILE_DIRECTORY: /opt/cases
      CVG_CASE_DIRS_ROOT: /opt/cases
    volumes:
      - ./:/opt/airflow
      - ../cases:/opt/cases:ro
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build: .
    container_name: justicetech-airflow-scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER:-airflow}:${DB_PASSWORD:-airflow}@postgres:5432/${DB_NAME:-justicetech_db}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__SCHEDULER__CHILD_PROCESS_LOG_DIRECTORY: /opt/airflow/logs/scheduler
      AIRFLOW_HOME: /opt/airflow
      PYTHONPATH: /opt/airflow
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-airflow}
      DB_PASSWORD: ${DB_PASSWORD:-airflow}
      DB_NAME: ${DB_NAME:-justicetech_db}
      CASES_FILE_DIRECTORY: /opt/cases
      CVG_CASE_DIRS_ROOT: /opt/cases
    volumes:
      - ./:/opt/airflow
      - ../cases:/opt/cases:ro
    command: scheduler

volumes:
  postgres_data:
